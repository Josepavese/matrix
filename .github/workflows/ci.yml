name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24.4'
    - name: Code governance
      run: go run ./scripts/code_governance.go --config code-governance.toml

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24.4'
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.11.4

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24.4'
    - name: Test
      run: go test -race -v ./...

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24.4'
    - name: Build matrix
      run: go build ./cmd/matrix

  release-dry-run:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24.4'
    - name: GoReleaser snapshot
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: v2.15.3
        args: release --snapshot --clean
