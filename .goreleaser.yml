version: 2

project_name: matrix

before:
  hooks:
    - go mod tidy

builds:
  - id: matrix
    main: ./cmd/matrix
    binary: matrix
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: matrix
    ids:
      - matrix
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - configs/README.md
      - configs/agents.json
      - configs/node_env.json
      - configs/telegram.json
      - configs/locales/**
      - docs/matrix_installation.md
      - docs/matrix_timeout_recovery_policy.md
      - install/**

release:
  extra_files:
    - glob: ./install/install.sh
    - glob: ./install/install.ps1

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Version }}-snapshot"

changelog:
  disable: true
