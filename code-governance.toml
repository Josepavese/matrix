# 2026-05-04: fork subtree cleanup proof reconciles child records after parent
# process reap; forced run-owned child cleanup can remediate parent-owner
# retention without weakening inline parent-restore safety. Later same-day
# active-resume hardening adds owner-run proof and real OpenCode fork cleanup
# acceptance without adding quality warnings. The same-day HTTP standalone fork
# cleanup regression adds provider-quiescence proof for stdio ACP. 2026-05-08:
# shared same-workspace provider owners are now explicit non-retained cleanup
# evidence when the target remote session has strong provider proof.
"internal/logic/session" = 5250
# 2026-05-21: ACP v0.13.2 alignment adds protocol-neutral
# additional-directories propagation and current AuthEnvVar secret defaults.
"internal/middleware" = 980
# 2026-04-27: workspace timeline event recording split validation/persistence/state update.
"internal/logic/workspace" = 910
# 2026-05-04/05/08: Zed ACP v0.12.2 lifecycle plus session-bound tombstone
# proof for dead/replaced local ACP clients used by fork subtree cleanup. Final
# resume cleanup adds scoped reconcile ownership details and no-fresh-stdio
# lifecycle clients for cleanup-only paths. 2026-05-08 separates cached
# provider-client lifetime from per-request contexts, tombstones dead exact
# lifecycle clients before cleanup proof, and evicts poisoned workspace clients
# after cancellable prompt failures so immediate follow-up runs cannot inherit
# a cancelled ACP client. 2026-05-21 adds current ACP auth/env-var fallback,
# additionalDirectories validation, and agent-first terminal-auth policy.
"internal/providers/agents" = 3160
# 2026-05-04: run-level cleanup proofs reuse parent-covered fork_children and
# avoid double-cleaning related fork sessions already proven by child/parent
# subtree cleanup. Final resume cleanup scopes reconcile by run agent/workspace.
# 2026-05-08: cancel/session-create race cleanup binds ephemeral runs to the
# prepared logical session and follows late-selected remote sessions when needed.
# 2026-05-21 accepts and validates ACP additional_directories on run ingress.
"internal/providers/runapi" = 1270
# 2026-05-04/05: Zed ACP schema v0.12.2 stable lifecycle/config surface plus
# observer drain for providers that emit trailing session/update chunks after
# session/prompt returns. 2026-05-21: v0.13.2 auth defaults, current
# authenticate request shape, and permissive draft model-state decoding.
"pkg/zedacp" = 1570

